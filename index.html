<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPI · Inspetores · Zagonel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f4f6f4;color:#1a2e1a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}

/* TOP BAR */
.top-bar{background:#fff;border-bottom:3px solid #22B04B;padding:10px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(34,176,75,.10)}
.logo-cq{height:52px;object-fit:contain}
.logo-zagonel{height:36px;object-fit:contain}
.top-center h1{font-size:15px;font-weight:700;color:#1a2e1a;text-align:center;letter-spacing:.02em}
.top-center p{font-size:11px;color:#5a8a60;text-align:center;margin-top:2px}

/* LAYOUT */
.dash{padding:18px 24px;max-width:1100px;margin:0 auto}

/* DAY TOGGLE */
.day-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.dbtn{padding:6px 13px;font-size:12px;font-weight:500;background:#fff;border:1px solid #d0e8d0;border-radius:6px;cursor:pointer;color:#3a6e3a;transition:all .15s}
.dbtn:hover{border-color:#22B04B;color:#22B04B}
.dbtn.active{background:#22B04B;color:#fff;border-color:#22B04B}

/* SETOR FILTER */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.filter-label{font-size:12px;font-weight:600;color:#3a6e3a;margin-right:4px}
.fchip{padding:5px 14px;font-size:12px;border-radius:20px;cursor:pointer;border:1.5px solid #d0e8d0;background:#fff;color:#3a6e3a;transition:all .15s;font-weight:500}
.fchip:hover{border-color:#22B04B}
.fchip.active{background:#22B04B;color:#fff;border-color:#22B04B}

/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi-card{background:#fff;border:1.5px solid #d0e8d0;border-radius:10px;padding:14px 16px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:#22B04B}
.kpi-lbl{font-size:10px;font-weight:700;color:#5a8a60;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.kpi-val{font-size:26px;font-weight:700;color:#1a2e1a;line-height:1}
.kpi-sub{font-size:11px;color:#5a8a60;margin-top:5px}
.kpi-bar{height:3px;background:#e8f5e9;border-radius:2px;overflow:hidden;margin-top:8px}
.kpi-bar-fill{height:100%;background:#22B04B;border-radius:2px}

/* SECTION HEADER */
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.section-title{font-size:11px;font-weight:700;color:#5a8a60;text-transform:uppercase;letter-spacing:.08em}
.section-date{font-size:11px;color:#5a8a60}

/* INSPECTOR CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.icard{background:#fff;border:1.5px solid #d0e8d0;border-radius:10px;padding:16px;transition:all .15s}
.icard:hover{border-color:#22B04B;box-shadow:0 2px 12px rgba(34,176,75,.12)}
.icard.sem-dados{opacity:.5;border-style:dashed}
.icard-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.icard-left{display:flex;align-items:center;gap:10px}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.icard-name{font-size:13px;font-weight:700;color:#1a2e1a}
.icard-setor{font-size:11px;color:#22B04B;margin-top:2px;font-weight:500}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:4px}
.badge-s{background:#e8f5e9;color:#1a6b3a;border:1px solid #a5d6a7}
.badge-a{background:#f1f8e9;color:#2E7D32;border:1px solid #c5e1a5}
.badge-n{background:#fff3e0;color:#e65100;border:1px solid #ffcc80}
.badge-abs{background:#f5f5f5;color:#9e9e9e;border:1px solid #e0e0e0}
.big-pct{font-size:32px;font-weight:700;line-height:1;margin-bottom:2px}
.icard-meta{font-size:11px;color:#5a8a60;margin-bottom:8px}
.prog-track{height:4px;background:#e8f5e9;border-radius:2px;overflow:hidden;margin-bottom:10px}
.prog-fill{height:100%;border-radius:2px}
.icard-approval{font-size:11px;color:#5a8a60;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.emoji-ok{color:#22B04B}
.emoji-rep{color:#e65100}
.icard-stats{display:flex;border-top:1px solid #e8f5e9;padding-top:10px;gap:0}
.istat{flex:1;text-align:center}
.istat-val{font-size:14px;font-weight:700;color:#1a2e1a}
.istat-lbl{font-size:9px;color:#5a8a60;text-transform:uppercase;letter-spacing:.05em;margin-top:1px}
.istat+.istat{border-left:1px solid #e8f5e9}
.sem-dados-msg{text-align:center;padding:20px 0;font-size:12px;color:#a5c8a8;font-style:italic}

/* COMP */
.comp-day-lbl{font-size:10px;font-weight:600;color:#5a8a60;text-transform:uppercase;margin-top:8px;margin-bottom:4px}
.comp-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.comp-bar-bg{flex:1;height:4px;background:#e8f5e9;border-radius:2px;overflow:hidden}
.comp-bar-fill{height:100%;border-radius:2px}
.delta-pill{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:700}
.du{background:#e8f5e9;color:#1a6b3a}.dd{background:#fff3e0;color:#e65100}.deq{background:#f5f5f5;color:#9e9e9e}

/* UPLOAD BTN */
.btn-upload{display:inline-flex;align-items:center;gap:6px;background:#22B04B;color:#fff;border:none;padding:7px 16px;border-radius:7px;font-size:12px;font-weight:600;text-decoration:none;transition:background .15s}
.btn-upload:hover{background:#1a8f3a}

/* TABS */
.main-tabs{display:flex;border-bottom:2px solid #d0e8d0;margin-bottom:18px;gap:0}
.main-tab{padding:9px 22px;font-size:13px;font-weight:600;cursor:pointer;color:#5a8a60;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s}
.main-tab.active{color:#22B04B;border-bottom-color:#22B04B}
.sub-tabs{display:flex;border-bottom:1px solid #d0e8d0;margin-bottom:14px}
.sub-tab{padding:7px 18px;font-size:12px;font-weight:500;cursor:pointer;color:#5a8a60;border-bottom:2px solid transparent;margin-bottom:-1px}
.sub-tab.active{color:#22B04B;border-bottom-color:#22B04B}
.panel{display:none}.panel.active{display:block}

/* PRODUCTS TABLE */
.prod-table{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border-radius:10px;overflow:hidden;border:1.5px solid #d0e8d0}
.prod-table th{text-align:left;font-size:10px;font-weight:700;color:#5a8a60;padding:10px 14px;background:#f0faf0;border-bottom:1px solid #d0e8d0;text-transform:uppercase;letter-spacing:.05em}
.prod-table th.r,.prod-table td.r{text-align:right}
.prod-table td{padding:10px 14px;border-top:1px solid #f0faf0;color:#1a2e1a}
.prod-table tr:hover td{background:#f9fef9}

/* RELATÓRIO */
.rel-controls{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;margin-bottom:20px;padding:16px;background:#fff;border-radius:10px;border:1.5px solid #d0e8d0}
.rel-field{display:flex;flex-direction:column;gap:6px}
.rel-label{font-size:10px;font-weight:700;color:#5a8a60;text-transform:uppercase;letter-spacing:.05em}
.rel-select{background:#fff;color:#1a2e1a;border:1.5px solid #d0e8d0;border-radius:6px;padding:7px 12px;font-size:13px;cursor:pointer;min-width:180px}
.rel-select:focus{outline:none;border-color:#22B04B}
.btn-gerar{background:#22B04B;color:#fff;border:none;padding:9px 22px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer}
.btn-gerar:hover{background:#1a8f3a}
.btn-img{background:#fff;color:#22B04B;border:1.5px solid #22B04B;padding:8px 18px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer}
.btn-img:hover{background:#f0faf0}

/* RELATÓRIO CARD */
#rel-card{background:#fff;border:1.5px solid #d0e8d0;border-radius:12px;padding:28px;max-width:720px}
#rel-card::before{content:'';display:block;height:4px;background:#22B04B;border-radius:4px 4px 0 0;margin:-28px -28px 24px}
.rel-header{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:16px;border-bottom:1px solid #d0e8d0;margin-bottom:18px}
.rel-avatar{width:48px;height:48px;border-radius:50%;background:#e8f5e9;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#22B04B;flex-shrink:0;border:2px solid #a5d6a7}
.rel-name{font-size:17px;font-weight:700;color:#1a2e1a}
.rel-sub{font-size:12px;color:#5a8a60;margin-top:3px}
.rel-period{text-align:right;font-size:12px;color:#5a8a60}
.rel-period strong{display:block;font-size:14px;color:#1a2e1a;font-weight:600}
.rel-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.rel-kpi{background:#f0faf0;border-radius:8px;padding:10px 12px;border:1px solid #d0e8d0}
.rel-kpi-lbl{font-size:10px;color:#5a8a60;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;font-weight:600}
.rel-kpi-val{font-size:20px;font-weight:700;color:#1a2e1a}
.rel-kpi-sub{font-size:10px;color:#5a8a60;margin-top:2px}
.rel-section{font-size:10px;font-weight:700;color:#5a8a60;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.rel-days{display:flex;flex-direction:column;gap:7px;margin-bottom:20px}
.rel-day{border:1px solid #e8f5e9;border-radius:7px;padding:9px 14px;display:flex;align-items:center;gap:12px}
.rel-day-date{font-size:12px;font-weight:600;color:#5a8a60;width:42px;flex-shrink:0}
.rel-day-bar-bg{flex:1;height:5px;background:#e8f5e9;border-radius:3px;overflow:hidden}
.rel-day-bar-fill{height:100%;border-radius:3px}
.rel-day-pct{font-size:12px;font-weight:700;min-width:40px;text-align:right}
.rel-day-real{font-size:11px;color:#5a8a60;min-width:70px;text-align:right}
.rel-lines-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:20px}
.rel-lines-table th{text-align:left;padding:6px 10px;font-size:10px;font-weight:700;color:#5a8a60;text-transform:uppercase;border-bottom:1px solid #d0e8d0}
.rel-lines-table th.r,.rel-lines-table td.r{text-align:right}
.rel-lines-table td{padding:8px 10px;border-top:1px solid #f0faf0;color:#1a2e1a}
.rel-footer{display:flex;justify-content:space-between;align-items:center;padding-top:14px;border-top:1px solid #d0e8d0;font-size:10px;color:#5a8a60}
.rel-legend{display:flex;gap:14px}
.loading{text-align:center;padding:60px;color:#5a8a60;font-size:14px}
.empty{text-align:center;padding:40px 0;color:#a5c8a8;font-size:13px;grid-column:1/-1}
@media(max-width:580px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.cards-grid{grid-template-columns:1fr}.rel-kpis{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

<script>
let D=null,day,subTab='inspetores',selTurno=new Set();
const TURNOS={'15h00':['Ketlin','Iliane','Andris','Yenire','Marta'],'05h20':['Yorjelis','Thalia','Caroline','Andrea','Eliandra'],'07h12':['Alicia','Marianny','Ana Paula','Karen']};

const AVATAR_COLORS=[
  ['#e8f5e9','#1a6b3a'],['#e3f2fd','#0d47a1'],['#fce4ec','#880e4f'],
  ['#fff3e0','#bf360c'],['#f3e5f5','#4a148c'],['#e0f7fa','#006064'],
  ['#f9fbe7','#33691e'],['#fbe9e7','#bf360c'],['#ede7f6','#311b92'],
  ['#e8eaf6','#1a237e'],['#e0f2f1','#004d40'],['#fff8e1','#f57f17']
];
function avatarColor(i){return AVATAR_COLORS[i%AVATAR_COLORS.length];}
function initials(n){const p=n.split(' ');return (p[0][0]+(p[p.length-1][0]||'')).toUpperCase();}
function getTurno(n){for(const[t,a]of Object.entries(TURNOS)){if(a.some(x=>n.includes(x)))return t;}return'—';}

const bc=s=>s==='SUPEROU'?'#22B04B':s==='ATINGIU'?'#4CAF50':'#e65100';
const bCls=s=>s==='SUPEROU'?'badge-s':s==='ATINGIU'?'badge-a':s==='NAO_ATINGIU'?'badge-n':'badge-abs';
const bTxt=s=>s==='SUPEROU'?'✓ Superou':s==='ATINGIU'?'● Atingiu':s==='NAO_ATINGIU'?'✕ Não atingiu':'Sem dados';
const w=v=>Math.min(v,120)/1.2;

async function loadData(){
  try{
    const r=await fetch('/data');
    if(!r.ok)throw new Error();
    D=await r.json();
    day=D.days[D.days.length-1];
    buildUI();
  }catch(e){
    document.getElementById('main-content').innerHTML='<div class="loading">⚠️ Sem dados ainda. <a href="/upload-page" style="color:#22B04B;font-weight:600">Fazer upload →</a></div>';
  }
}

function buildUI(){
  document.getElementById('main-content').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px">
      <div class="main-tabs" style="margin-bottom:0;border:none">
        <div class="main-tab active" onclick="setMainTab('dashboard')">Dashboard</div>
        <div class="main-tab" onclick="setMainTab('relatorio')">📋 Relatório Individual</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:11px;color:#5a8a60;background:#f0faf0;padding:4px 10px;border-radius:6px;border:1px solid #d0e8d0" id="last-update">Carregando...</span>
        <a href="/upload-page" class="btn-upload">📤 Novo upload</a>
      </div>
    </div>
    <div id="panel-dashboard" class="panel active"></div>
    <div id="panel-relatorio" class="panel"></div>
  `;
  document.getElementById('last-update').textContent=`Último upload: ${D.days[D.days.length-1]}`;
  buildDashboard();
  buildRelatorio();
}

function setMainTab(t){
  document.querySelectorAll('.main-tab').forEach((b,i)=>b.classList.toggle('active',['dashboard','relatorio'][i]===t));
  document.querySelectorAll('#panel-dashboard,#panel-relatorio').forEach((p,i)=>p.classList.toggle('active',['dashboard','relatorio'][i]===t));
}

function buildDashboard(){
  document.getElementById('panel-dashboard').innerHTML=`
    <div class="day-bar" id="day-toggle"></div>
    <div class="filter-bar">
      <span class="filter-label">Colaborador:</span>
      <div id="insp-chips"></div>
    </div>
    <div id="kpi-area" class="kpi-grid"></div>
    <div class="sub-tabs">
      <div class="sub-tab active" onclick="setSubTab('inspetores')">Inspetores</div>
      <div class="sub-tab" onclick="setSubTab('produtos')">Produtos</div>
    </div>
    <div id="panel-inspetores" class="panel active"></div>
    <div id="panel-produtos" class="panel"></div>
  `;
  buildDayToggle();buildChips();render();
}

function setDay(d){day=d;document.querySelectorAll('.dbtn').forEach(b=>b.classList.toggle('active',b.dataset.d===d));render();}
function setSubTab(t){subTab=t;document.querySelectorAll('.sub-tab').forEach((b,i)=>b.classList.toggle('active',['inspetores','produtos'][i]===t));document.querySelectorAll('#panel-inspetores,#panel-produtos').forEach((p,i)=>p.classList.toggle('active',['inspetores','produtos'][i]===t));render();}

function buildDayToggle(){
  document.getElementById('day-toggle').innerHTML=
    D.days.map((d,i)=>`<button class="dbtn${i===D.days.length-1?' active':''}" data-d="${d}" onclick="setDay('${d}')">${d}</button>`).join('')+
    `<button class="dbtn${day==='comp'?' active':''}" data-d="comp" onclick="setDay('comp')">Geral</button>`;
}

let selInsp=new Set();
function buildChips(){
  document.getElementById('insp-chips').innerHTML=
    `<div class="fchip active" id="ca" onclick="clearInsp()">Todos</div>`+
    D.inspetores.map((x,i)=>`<div class="fchip" id="c${i}" onclick="toggleInsp(${i})">${x.nome.split(' ')[0]}</div>`).join('');
}
function clearInsp(){selInsp.clear();document.querySelectorAll('[id^="c"]:not([id="ca"])').forEach(c=>c.className='fchip');document.getElementById('ca').className='fchip active';render();}
function toggleInsp(i){
  document.getElementById('ca').className='fchip';
  if(selInsp.has(i)){selInsp.delete(i);document.getElementById('c'+i).className='fchip';}
  else{selInsp.add(i);document.getElementById('c'+i).className='fchip active';}
  if(!selInsp.size)document.getElementById('ca').className='fchip active';
  render();
}
const filtered=()=>D.inspetores.filter((_,i)=>selInsp.size===0||selInsp.has(i));

function calcTotals(group,d){
  const pr=group.filter(x=>x.dias[d]);
  const tot=pr.reduce((a,x)=>a+x.dias[d].total,0);
  const met=pr.reduce((a,x)=>a+x.dias[d].meta,0);
  const pct=met?Math.round(tot/met*1000)/10:0;
  return{tot,met,pct,ns:pr.filter(x=>x.dias[d].status==='SUPEROU').length,na:pr.filter(x=>x.dias[d].status==='ATINGIU').length,nn:pr.filter(x=>x.dias[d].status==='NAO_ATINGIU').length,n:pr.length};
}

function render(){renderKPIs();if(subTab==='inspetores')renderCards();else renderProdutos();}

function renderKPIs(){
  const el=document.getElementById('kpi-area');if(!el)return;
  const f=filtered();
  if(day==='comp'){
    const tots=D.days.map(d=>calcTotals(f,d));
    el.innerHTML=`${D.days.map((d,i)=>`<div class="kpi-card"><div class="kpi-lbl">Peças ${d}</div><div class="kpi-val" style="color:${tots[i].pct>=95?'#22B04B':tots[i].pct>=85?'#4CAF50':'#e65100'}">${tots[i].tot.toLocaleString('pt-BR')}</div><div class="kpi-sub">${tots[i].pct}% da meta</div><div class="kpi-bar"><div class="kpi-bar-fill" style="width:${Math.min(tots[i].pct,100)}%;background:${tots[i].pct>=95?'#22B04B':tots[i].pct>=85?'#4CAF50':'#e65100'}"></div></div></div>`).join('')}
    <div class="kpi-card"><div class="kpi-lbl">Status por dia</div><div style="display:flex;flex-direction:column;gap:5px;margin-top:6px;font-size:11px">${D.days.map((d,i)=>`<div style="display:flex;justify-content:space-between;align-items:center"><span style="color:#5a8a60">${d}</span><span><span style="color:#22B04B;font-weight:600">✓${tots[i].ns}</span> <span style="color:#4CAF50;font-weight:600">●${tots[i].na}</span> <span style="color:#e65100;font-weight:600">✕${tots[i].nn}</span></span></div>`).join('')}</div></div>`;
    return;
  }
  const t=calcTotals(f,day);
  el.innerHTML=`
    <div class="kpi-card"><div class="kpi-lbl">Realizadas</div><div class="kpi-val">${t.tot.toLocaleString('pt-BR')}</div><div class="kpi-sub">meta · ${t.met.toLocaleString('pt-BR')}</div><div class="kpi-bar"><div class="kpi-bar-fill" style="width:${Math.min(t.pct,100)}%"></div></div></div>
    <div class="kpi-card"><div class="kpi-lbl">% da meta</div><div class="kpi-val" style="color:${t.pct>=95?'#22B04B':t.pct>=85?'#4CAF50':'#e65100'}">${t.pct}%</div><div class="kpi-sub">${t.n} com dados</div></div>
    <div class="kpi-card"><div class="kpi-lbl">Status</div>
      <div style="display:flex;flex-direction:column;gap:5px;margin-top:6px">
        <div style="display:flex;align-items:center;justify-content:space-between"><span style="font-size:12px;color:#5a8a60">● ${t.ns} superou</span><div style="width:${t.n?t.ns/t.n*100:0}%;height:4px;background:#22B04B;border-radius:2px;flex:1;margin-left:8px"></div></div>
        <div style="display:flex;align-items:center;justify-content:space-between"><span style="font-size:12px;color:#5a8a60">● ${t.na} atingiu</span><div style="width:${t.n?t.na/t.n*100:0}%;height:4px;background:#4CAF50;border-radius:2px;flex:1;margin-left:8px"></div></div>
        <div style="display:flex;align-items:center;justify-content:space-between"><span style="font-size:12px;color:#5a8a60">● ${t.nn} abaixo</span><div style="width:${t.n?t.nn/t.n*100:0}%;height:4px;background:#e65100;border-radius:2px;flex:1;margin-left:8px"></div></div>
      </div>
    </div>
    <div class="kpi-card"><div class="kpi-lbl">Atingimento</div><div class="kpi-val" style="color:${t.pct>=95?'#22B04B':t.pct>=85?'#4CAF50':'#e65100'}">${t.pct}%</div><div class="kpi-bar"><div class="kpi-bar-fill" style="width:${Math.min(t.pct,100)}%;background:${t.pct>=95?'#22B04B':t.pct>=85?'#4CAF50':'#e65100'}"></div></div><div class="kpi-sub">${t.tot.toLocaleString('pt-BR')} de ${t.met.toLocaleString('pt-BR')}</div></div>`;
}

function linhasHtml(linhas){
  if(!linhas||!linhas.length)return'';
  return linhas.map(l=>`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;font-size:11px">
    <span style="color:#5a8a60;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.label}</span>
    <div style="display:flex;align-items:center;gap:6px">
      <div style="width:50px;height:3px;background:#e8f5e9;border-radius:2px;overflow:hidden"><div style="width:${w(l.pct)}%;height:100%;background:${bc(l.status)}"></div></div>
      <span style="font-weight:700;color:${bc(l.status)};min-width:34px;text-align:right">${l.pct}%</span>
      <span style="color:#a5c8a8;min-width:20px;text-align:right">${l.total}</span>
    </div>
  </div>`).join('');
}

function renderCards(){
  const el=document.getElementById('panel-inspetores');if(!el)return;
  const f=filtered();
  if(!f.length){el.innerHTML=`<div class="cards-grid"><div class="empty">Nenhum colaborador encontrado.</div></div>`;return;}

  let h=`<div class="section-header"><span class="section-title">Inspetores</span><span class="section-date">DIA ${day==='comp'?'(todos)':day}</span></div><div class="cards-grid">`;

  f.forEach((insp,idx)=>{
    const [abg,afg]=avatarColor(idx);
    const ini=initials(insp.nome);
    const turno=getTurno(insp.nome);

    if(day==='comp'){
      const dAll=D.days.map(d=>insp.dias[d]);
      const dFirst=dAll.find(Boolean),dLast=[...dAll].reverse().find(Boolean);
      const delta=dFirst&&dLast&&dFirst!==dLast?+(dLast.pct-dFirst.pct).toFixed(1):null;
      const dCls=delta===null?'deq':delta>0?'du':delta<0?'dd':'deq';
      const dTxt=delta===null?'—':delta>0?`▲ +${delta}pp`:delta<0?`▼ ${delta}pp`:'=';
      h+=`<div class="icard">
        <div class="icard-header">
          <div class="icard-left"><div class="avatar" style="background:${abg};color:${afg}">${ini}</div><div><div class="icard-name">${insp.nome}</div><div class="icard-setor">Turno ${turno}</div></div></div>
          <span class="delta-pill ${dCls}">${dTxt}</span>
        </div>
        ${D.days.map(d=>{const dd=insp.dias[d];return`<div class="comp-day-lbl">${d}</div>`+(dd?`<div class="comp-row"><span style="font-size:11px;font-weight:700;color:${bc(dd.status)};width:38px;flex-shrink:0">${dd.pct}%</span><div class="comp-bar-bg"><div class="comp-bar-fill" style="width:${w(dd.pct)}%;background:${bc(dd.status)}"></div></div><span class="badge ${bCls(dd.status)}" style="font-size:9px">${bTxt(dd.status)}</span></div>${linhasHtml(dd.linhas)}`:'<div style="font-size:11px;color:#a5c8a8;padding:3px 0;font-style:italic">Ausente</div>');}).join('')}
        <div class="icard-stats" style="margin-top:10px">${D.days.map(d=>`<div class="istat"><div class="istat-val">${insp.dias[d]?insp.dias[d].total:'—'}</div><div class="istat-lbl">${d}</div></div>`).join('')}</div>
      </div>`;
      return;
    }

    const d=insp.dias[day];
    if(!d){
      h+=`<div class="icard sem-dados">
        <div class="icard-header"><div class="icard-left"><div class="avatar" style="background:${abg};color:${afg};opacity:.5">${ini}</div><div><div class="icard-name" style="color:#9e9e9e">${insp.nome}</div><div class="icard-setor">Turno ${turno}</div></div></div></div>
        <div class="sem-dados-msg">sem dados</div>
      </div>`;
      return;
    }

    const apr=d.linhas?d.linhas.reduce((a,l)=>a+l.total,0):d.total;
    const rep=0;

    h+=`<div class="icard">
      <div class="icard-header">
        <div class="icard-left"><div class="avatar" style="background:${abg};color:${afg}">${ini}</div>
        <div><div class="icard-name">${insp.nome}</div><div class="icard-setor">Turno ${turno}</div></div></div>
        <span class="badge ${bCls(d.status)}">${bTxt(d.status)}</span>
      </div>
      <div class="big-pct" style="color:${bc(d.status)}">${d.pct}%</div>
      <div class="icard-meta">${d.total} insp · meta ${d.meta}</div>
      <div class="prog-track"><div class="prog-fill" style="width:${w(d.pct)}%;background:${bc(d.status)}"></div></div>
      ${linhasHtml(d.linhas)}
      <div class="icard-stats">
        <div class="istat"><div class="istat-val">${d.total}</div><div class="istat-lbl">Realizadas</div></div>
        <div class="istat"><div class="istat-val">${d.meta}</div><div class="istat-lbl">Meta</div></div>
        <div class="istat"><div class="istat-val" style="color:${bc(d.status)}">${d.pct}%</div><div class="istat-lbl">Ating.</div></div>
      </div>
    </div>`;
  });
  h+='</div>';
  el.innerHTML=h;
}

function renderProdutos(){
  const el=document.getElementById('panel-produtos');if(!el)return;
  if(day==='comp'){
    let h=`<table class="prod-table"><thead><tr><th>Produto</th>${D.days.map(d=>`<th class="r">${d}</th>`).join('')}</tr></thead><tbody>`;
    D.produtos.forEach(p=>{const vals=D.days.map(d=>p.dias[d]);const v0=vals[0],vL=vals[vals.length-1];const trend=v0&&vL?(vL-v0>0?` <span style="color:#22B04B">▲</span>`:(vL-v0<0?` <span style="color:#e65100">▼</span>`:'')):'';h+=`<tr><td>${p.nome}${trend}</td>${vals.map(v=>`<td class="r">${v!=null?v:'—'}</td>`).join('')}</tr>`;});
    h+=`</tbody></table>`;el.innerHTML=h;return;
  }
  let h=`<table class="prod-table"><thead><tr><th>Produto</th><th class="r">Peças testadas</th></tr></thead><tbody>`;
  D.produtos.forEach(p=>{const v=p.dias[day];if(!v){h+=`<tr style="opacity:.4"><td>${p.nome}</td><td class="r" style="font-style:italic;color:#a5c8a8">Sem produção</td></tr>`;return;}h+=`<tr><td>${p.nome}</td><td class="r"><strong>${v}</strong></td></tr>`;});
  h+=`</tbody></table>`;el.innerHTML=h;
}

/* RELATÓRIO INDIVIDUAL */
function buildRelatorio(){
  const mesesUnicos=[...new Set(D.days.map(d=>d.split('/')[1]))];
  document.getElementById('panel-relatorio').innerHTML=`
    <div class="rel-controls">
      <div class="rel-field"><label class="rel-label">Colaborador</label>
        <select class="rel-select" id="rel-insp">
          <option value="">Seleciona...</option>
          ${D.inspetores.map(x=>`<option value="${x.nome}">${x.nome}</option>`).join('')}
        </select>
      </div>
      <div class="rel-field"><label class="rel-label">Mês</label>
        <select class="rel-select" id="rel-mes" onchange="updateDiasDisponiveis()">
          <option value="">Todos</option>
          ${mesesUnicos.map(m=>`<option value="${m}">${m==='04'?'Abril':m==='05'?'Maio':m==='06'?'Junho':m==='07'?'Julho':m==='08'?'Agosto':m}/2026</option>`).join('')}
        </select>
      </div>
      <div class="rel-field"><label class="rel-label">De</label>
        <select class="rel-select" id="rel-de">${D.days.map(d=>`<option value="${d}">${d}</option>`).join('')}</select>
      </div>
      <div class="rel-field"><label class="rel-label">Até</label>
        <select class="rel-select" id="rel-ate">${D.days.map((d,i)=>`<option value="${d}" ${i===D.days.length-1?'selected':''}>${d}</option>`).join('')}</select>
      </div>
      <button class="btn-gerar" onclick="gerarRelatorio()">Gerar relatório</button>
    </div>
    <div id="rel-output"></div>
  `;
}

function updateDiasDisponiveis(){
  const mes=document.getElementById('rel-mes').value;
  const dias=mes?D.days.filter(d=>d.split('/')[1]===mes):D.days;
  const opts=dias.map(d=>`<option value="${d}">${d}</option>`).join('');
  document.getElementById('rel-de').innerHTML=opts;
  document.getElementById('rel-ate').innerHTML=dias.map((d,i)=>`<option value="${d}" ${i===dias.length-1?'selected':''}>${d}</option>`).join('');
}

function gerarRelatorio(){
  const nome=document.getElementById('rel-insp').value;
  const de=document.getElementById('rel-de').value;
  const ate=document.getElementById('rel-ate').value;
  if(!nome){alert('Seleciona um colaborador!');return;}
  const insp=D.inspetores.find(x=>x.nome===nome);
  if(!insp)return;

  function dayToNum(d){const p=d.split('/');return parseInt(p[1])*100+parseInt(p[0]);}
  const deN=dayToNum(de),ateN=dayToNum(ate);
  const dias=D.days.filter(d=>{const n=dayToNum(d);return n>=deN&&n<=ateN;});
  const diasComDados=dias.filter(d=>insp.dias[d]);

  if(!diasComDados.length){document.getElementById('rel-output').innerHTML=`<p style="color:#5a8a60;text-align:center;padding:40px">Sem dados para este colaborador no período selecionado.</p>`;return;}

  const totalPecas=diasComDados.reduce((a,d)=>a+insp.dias[d].total,0);
  const totalMeta=diasComDados.reduce((a,d)=>a+insp.dias[d].meta,0);
  const mediaDiaria=Math.round(totalPecas/diasComDados.length);
  const mediaPct=Math.round(totalPecas/totalMeta*1000)/10;
  const consistencia=diasComDados.filter(d=>insp.dias[d].pct>=85).length;
  const turno=getTurno(nome);
  const ini=initials(nome);
  const statusGeral=mediaPct>=95?'SUPEROU':mediaPct>=85?'ATINGIU':'NAO_ATINGIU';
  const corGeral=bc(statusGeral);

  const linhasMap={};
  diasComDados.forEach(d=>{insp.dias[d].linhas.forEach(l=>{if(!linhasMap[l.label])linhasMap[l.label]={total:0,meta:0,count:0};linhasMap[l.label].total+=l.total;linhasMap[l.label].meta+=l.meta;linhasMap[l.label].count++;});});
  const linhas=Object.entries(linhasMap).map(([label,v])=>{const pct=Math.round(v.total/v.meta*1000)/10;return{label,total:Math.round(v.total/v.count),meta:Math.round(v.meta/v.count),pct,status:pct>=95?'SUPEROU':pct>=85?'ATINGIU':'NAO_ATINGIU'};});

  document.getElementById('rel-output').innerHTML=`
    <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
      <button class="btn-img" onclick="exportarImagem()">📸 Exportar imagem</button>
    </div>
    <div id="rel-card">
      <div class="rel-header">
        <div style="display:flex;align-items:center;gap:14px">
          <div class="rel-avatar">${ini}</div>
          <div><div class="rel-name">${nome}</div><div class="rel-sub">Turno ${turno} · ${linhas.map(l=>l.label).join(' · ')}</div></div>
        </div>
        <div class="rel-period"><span>Período</span><strong>${de} → ${ate}</strong><span>${diasComDados.length} dia${diasComDados.length!==1?'s':''} com dados</span></div>
      </div>
      <div class="rel-kpis">
        <div class="rel-kpi"><div class="rel-kpi-lbl">Total peças</div><div class="rel-kpi-val">${totalPecas.toLocaleString('pt-BR')}</div><div class="rel-kpi-sub">no período</div></div>
        <div class="rel-kpi"><div class="rel-kpi-lbl">Média diária</div><div class="rel-kpi-val">${mediaDiaria}</div><div class="rel-kpi-sub">meta: ${Math.round(totalMeta/diasComDados.length)}/dia</div></div>
        <div class="rel-kpi"><div class="rel-kpi-lbl">% média meta</div><div class="rel-kpi-val" style="color:${corGeral}">${mediaPct}%</div><div class="rel-kpi-sub">${bTxt(statusGeral)}</div></div>
        <div class="rel-kpi"><div class="rel-kpi-lbl">Consistência</div><div class="rel-kpi-val">${consistencia}/${diasComDados.length}</div><div class="rel-kpi-sub">dias ≥ 85% meta</div></div>
      </div>
      <div class="rel-section">Evolução diária</div>
      <div class="rel-days">
        ${diasComDados.map(d=>{const dd=insp.dias[d];const cor=bc(dd.status);return`<div class="rel-day"><div class="rel-day-date">${d}</div><div class="rel-day-bar-bg"><div class="rel-day-bar-fill" style="width:${w(dd.pct)}%;background:${cor}"></div></div><div class="rel-day-pct" style="color:${cor}">${dd.pct}%</div><div class="rel-day-real">${dd.total} / ${dd.meta} peças</div><span class="badge ${bCls(dd.status)}" style="font-size:9px;flex-shrink:0">${bTxt(dd.status)}</span></div>`;}).join('')}
      </div>
      <div class="rel-section">Média por produto / linha</div>
      <table class="rel-lines-table">
        <thead><tr><th>Produto / Linha</th><th class="r">Realiz. (média)</th><th class="r">Meta</th><th class="r">% Meta</th></tr></thead>
        <tbody>${linhas.map(l=>`<tr><td>${l.label}</td><td class="r">${l.total}</td><td class="r">${l.meta}</td><td class="r" style="color:${bc(l.status)};font-weight:700">${l.pct}%</td></tr>`).join('')}</tbody>
      </table>
      <div class="rel-footer">
        <span>Zagonel · KPI Inspetores · Gerado em ${new Date().toLocaleDateString('pt-BR')}</span>
        <div class="rel-legend"><span style="color:#22B04B">✓ Superou ≥95%</span><span style="color:#4CAF50">● Atingiu 85–95%</span><span style="color:#e65100">✕ Não atingiu &lt;85%</span></div>
      </div>
    </div>
  `;
}

async function exportarImagem(){
  const card=document.getElementById('rel-card');
  if(!card)return;
  const btn=document.querySelector('.btn-img');
  btn.textContent='⏳ Gerando...';btn.disabled=true;
  try{
    const canvas=await html2canvas(card,{backgroundColor:'#ffffff',scale:2,useCORS:true});
    const link=document.createElement('a');
    const nome=document.getElementById('rel-insp').value.split(' ')[0];
    const de=document.getElementById('rel-de').value.replace('/','');
    const ate=document.getElementById('rel-ate').value.replace('/','');
    link.download=`KPI_${nome}_${de}_${ate}.png`;
    link.href=canvas.toDataURL('image/png');
    link.click();
  }catch(e){alert('Erro ao gerar imagem.');}
  btn.textContent='📸 Exportar imagem';btn.disabled=false;
}

loadData();
setInterval(()=>{if(D)loadData();},5*60*1000);
</script>
